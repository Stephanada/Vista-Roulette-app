<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Radio Roulette</title>
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="banner-container">
        <!-- Vista Radio Logo -->
        <a href="https://vistaradio.ca" target="_blank" class="vista-logo-link" style="margin: 20px;">
            <img src="vista-canada-logo-darkmode.svg" alt="Vista Radio" style="height: 40px; width: auto;">
        </a>

        <!-- Filters Panel -->
        <aside class="filters-panel">
            <div class="filter-group">
                <label for="province-select">Province</label>
                <select id="province-select" class="dropdown-select">
                    <option value="any">Any Province</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="format-select">Format</label>
                <select id="format-select" class="dropdown-select">
                    <option value="any">Any Format</option>
                </select>
            </div>
            <button id="spin-btn" class="spin-btn">ROULETTE</button>
        </aside>

        <!-- Main Display and Interaction -->
        <main class="roulette-main">
            <div class="station-display" id="station-display">
                <div class="marquee-wrapper">
                    <h1 id="station-name">Ready to Spin!</h1>
                </div>
                <div class="station-info-group">
                    <div class="format-string" id="format-string">Format • Province</div>
                    <div class="town-link" id="town-link-container" style="display: none;">
                        <a href="#" id="mytownnow-link" target="_blank">
                            <img id="mytownnow-logo" src="" alt="MyTownNow" style="display: none;">
                            <span id="mytownnow-text">MyTownNow</span>
                        </a>
                    </div>
                </div>
            </div>
            <!-- Station Logo (Centered Bottom) -->
            <div class="station-logo-container">
                <img id="station-logo" src="" alt="" style="display: none;">
            </div>
        </main>

        <!-- Audio Player, Visualizer & Local Info -->
        <aside class="player-controls">
            <div class="status-indicator" id="status-indicator"></div>

            <div class="local-info-widget">
                <div class="time-display" id="local-time">--:-- --</div>
                <div class="weather-row" id="local-weather">
                    <span class="weather-town" id="weather-town">--</span>
                    <span class="weather-divider">•</span>
                    <span id="weather-icon">☁️</span>
                    <span id="weather-temp">--°C</span>
                </div>
            </div>

            <div class="player-action-group">
                <button id="play-pause-btn" class="play-btn">
                    <svg viewBox="0 0 24 24" class="icon play-icon">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    <svg viewBox="0 0 24 24" class="icon pause-icon" style="display: none;">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                </button>
            </div>
            <audio id="audio-player" preload="none"></audio>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
